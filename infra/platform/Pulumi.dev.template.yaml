# Template for the hosted **dev** platform stack (lane `main-dev`, GitHub #672).
#
# Usage:
# 1. `cd infra/platform && pulumi stack init dev` (or your chosen stack name; README maps lane `main-dev` → stack `dev`).
# 2. Merge this file into `Pulumi.dev.yaml` or copy values with `pulumi config set`.
# 3. Set every **secret** via `pulumi config set --secret <key> <value>` — never commit real secrets.
# 4. Point `platform:hostname` at the dev web apex so Traefik rules match harness URLs
#    (e.g. dev.sprocket.mlesports.gg → API at api.dev.sprocket.mlesports.gg per `buildHost`).
# 5. Image tags: prefer immutable `sha-<full-git-sha>` once CI publishes them (#670); `dev` is a moving alias only.
#
# Isolation: dedicated Pulumi stack on the pre-prod Swarm, unique subdomain, DB, Redis prefix, RabbitMQ vhost,
# and Swarm service names vs prod/staging (see `reports/release-environment-contracts.md`).

config:
  # --- Non-secret stack identity (adjust to match your dev substrate) ---
  platform:subdomain: dev
  platform:hostname: dev.sprocket.mlesports.gg
  platform:image-namespace: sprocketbot
  platform:legacy-image-namespace: asaxplayinghorse
  platform:image-tag: dev
  # platform:layer_1-stack: dev
  # platform:layer_2-stack: dev

  # Postgres endpoint for the **dev** database cluster (not prod).
  # platform:postgres-username: <dev-db-user>
  # platform:postgres-port: '25060'
  # platform:postgres-host: <dev-db-hostname>

  # Optional Traefik / placement hints on the dev manager (same pattern as prod).
  # platform:server-ip: <swarm-manager-private-ip>
  # platform:tailscale-ip: <manager-tailscale-ip>

  # --- Registry (required for image pull; use secrets for the token) ---
  # platform:docker-username: <ghcr-or-registry-user>
  # platform:docker-access-token:
  #   secure: <pulumi-secret>

  # --- Application secrets (mirror `Pulumi.prod.yaml` key names; all via Pulumi secrets) ---
  # platform:postgres-password:
  #   secure: <pulumi-secret>
  # platform:discord-bot-token:
