config:
  infra-services:stack:
    environment: prod
    domainName: sprocket.mlesports.gg
    sharedStack: <pulumi-org>/infra-shared/shared-infra
    defaultImageTag: latest
    services:
      core:
        enabled: true
        image:
          repository: core
        replicas: 2
      web:
        enabled: true
        image:
          repository: web
        replicas: 2
      discord-bot:
        enabled: true
        image:
          repository: discord-bot
        replicas: 1
      image-generation-frontend:
        enabled: true
        image:
          repository: image-generation-frontend
        replicas: 2
      image-generation-service:
        enabled: true
        image:
          repository: image-generation-service
        replicas: 2
      matchmaking-service:
        enabled: true
        image:
          repository: matchmaking-service
        replicas: 2
      notification-service:
        enabled: true
        image:
          repository: notification-service
        replicas: 2
      replay-parse-service:
        enabled: true
        image:
          repository: replay-parse-service
        replicas: 2
      server-analytics-service:
        enabled: true
        image:
          repository: server-analytics-service
        replicas: 2
      submission-service:
        enabled: true
        image:
          repository: submission-service
        replicas: 2
      elo-service:
        enabled: true
        image:
          repository: elo-service
        replicas: 2
