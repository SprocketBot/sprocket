name: Deploy Sprocket Infra
description: Runs Pulumi against a remote Docker manager over SSH using the same contract as laptop deploys.

inputs:
  command:
    description: 'Pulumi command to run: preview, up, or refresh'
    required: true

  stack-project:
    description: 'Pulumi project directory under infra/: layer_1, layer_2, or platform'
    required: true

  stack-name:
    description: 'Pulumi stack name'
    required: true

  manager-node-host:
    description: 'Tailscale-reachable SSH host or IP for the Docker manager'
    required: true

  ssh-user:
    description: 'SSH user for remote Docker access'
    required: true

  ssh-key:
    description: 'Private SSH key for remote Docker access'
    required: true

  tailscale-authkey:
    description: 'Optional Tailscale auth key'
    required: false

  pulumi-backend-url:
    description: 'Pulumi backend URL. Example: s3://bucket/pulumi?endpoint=https://endpoint'
    required: false

  node-version:
    description: 'Node.js major used for infra commands (align with infra/README.md Tool versions)'
    required: false
    default: '20'

  pulumi-version:
    description: 'Pulumi CLI version (pin to infra/README.md Tool versions)'
    required: false
    default: '3.229.0'

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: |
          infra/layer_1/package-lock.json
          infra/layer_2/package-lock.json
          infra/platform/package-lock.json

    - name: Restore Pulumi plugin cache
      uses: actions/cache@v4
      with:
        path: ~/.pulumi/plugins
        key: pulumi-plugins-${{ runner.os }}-${{ inputs.pulumi-version }}-${{ hashFiles('infra/layer_1/package-lock.json', 'infra/layer_2/package-lock.json', 'infra/platform/package-lock.json') }}

    - name: Install Pulumi CLI
      shell: bash
      run: |
        curl -fsSL https://get.pulumi.com | sh -s -- --version "${{ inputs.pulumi-version }}"
        echo "${HOME}/.pulumi/bin" >> "${GITHUB_PATH}"

    - name: Connect Tailscale
      if: inputs.tailscale-authkey != ''
      uses: tailscale/github-action@v4
      with:
        authkey: ${{ inputs.tailscale-authkey }}

    - name: Configure remote Docker host
      shell: bash
      run: |
        ssh_dir="${HOME}/.ssh"
        key_file="${RUNNER_TEMP}/docker-host-${{ inputs.manager-node-host }}-${{ inputs.ssh-user }}.pem"

        mkdir -p "${ssh_dir}"
        chmod 700 "${ssh_dir}"
        printf '%s\n' '${{ inputs.ssh-key }}' > "${key_file}"
        chmod 600 "${key_file}"

        {
          echo "Host ${{ inputs.manager-node-host }}"
          echo "  HostName ${{ inputs.manager-node-host }}"
          echo "  User ${{ inputs.ssh-user }}"
          echo "  Port 22"
          echo "  IdentityFile ${key_file}"
          echo "  StrictHostKeyChecking no"
          echo "  IdentitiesOnly yes"
          echo "  ControlMaster auto"
          echo "  ControlPath ~/.ssh/socket-%r@%h:%p"
          echo "  ControlPersist yes"
        } >> "${ssh_dir}/config"
        chmod 600 "${ssh_dir}/config"

        echo "DOCKER_HOST=ssh://${{ inputs.ssh-user }}@${{ inputs.manager-node-host }}:22" >> "${GITHUB_ENV}"
        echo "DOCKER_SSH_KEY_FILE=${key_file}" >> "${GITHUB_ENV}"

    - name: Install infra dependencies
      shell: bash
      run: bash ./scripts/infra/pulumi-install-all.sh --project "${{ inputs.stack-project }}"

    - name: Run Pulumi
      shell: bash
      env:
        PULUMI_BACKEND_URL: ${{ inputs.pulumi-backend-url }}
      run: |
        cd ./infra/${{ inputs.stack-project }}

        if [ "${{ inputs.command }}" = "up" ]; then
          pulumi up --yes --stack ${{ inputs.stack-name }}
        else
          pulumi ${{ inputs.command }} --stack ${{ inputs.stack-name }}
        fi

    - name: Clean up remote Docker SSH key
      if: always()
      shell: bash
      run: rm -f "${DOCKER_SSH_KEY_FILE}"
