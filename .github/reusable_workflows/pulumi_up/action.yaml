name: Deploy Sprocket Infra
description: Runs Pulumi against a remote Docker manager over SSH using the same contract as laptop deploys.

inputs:
  command:
    description: 'Pulumi command to run: preview, up, or refresh'
    required: true

  stack-project:
    description: 'Pulumi project directory under infra/: layer_1, layer_2, or platform'
    required: true

  stack-name:
    description: 'Pulumi stack name'
    required: true

  manager-node-host:
    description: 'Tailscale-reachable SSH host or IP for the Docker manager'
    required: true

  ssh-user:
    description: 'SSH user for remote Docker access'
    required: true

  ssh-key:
    description: 'Private SSH key for remote Docker access'
    required: true

  tailscale-authkey:
    description: 'Optional Tailscale auth key'
    required: false

  pulumi-backend-url:
    description: 'Pulumi backend URL. Example: s3://bucket/pulumi?endpoint=https://endpoint'
    required: false

  node-version:
    description: 'Node.js version used for infra commands'
    required: false
    default: '16'

  install-command:
    description: 'Command used to install infra dependencies'
    required: false
    default: 'npm run infra:install'

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install Pulumi CLI
      shell: bash
      run: |
        curl -fsSL https://get.pulumi.com | sh
        echo "${HOME}/.pulumi/bin" >> "${GITHUB_PATH}"

    - name: Connect Tailscale
      if: inputs.tailscale-authkey != ''
      uses: tailscale/github-action@v3
      with:
        authkey: ${{ inputs.tailscale-authkey }}

    - name: Configure remote Docker host
      uses: khaledez/configure-docker-host@v2
      with:
        host: ${{ inputs.manager-node-host }}
        port: 22
        user: ${{ inputs.ssh-user }}
        ssh-private-key: ${{ inputs.ssh-key }}

    - name: Install infra dependencies
      shell: bash
      run: ${{ inputs.install-command }}

    - name: Run Pulumi
      shell: bash
      env:
        PULUMI_BACKEND_URL: ${{ inputs.pulumi-backend-url }}
      run: |
        extra_args=()
        if [ "${{ inputs.command }}" = "up" ]; then
          extra_args+=(--yes)
        fi

        npm run ci:infra:run -- "${{ inputs.stack-project }}" "${{ inputs.stack-name }}" "${{ inputs.command }}" "${extra_args[@]}"
