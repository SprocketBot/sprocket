name: Build Sprocket Container
description: 'Builds and pushes a Sprocket Container to GHCR'

inputs:
  build_directory:
    description: 'Path in the monorepo to use as root'
    required: true
  docker_image:
    description: 'Name of the image to build'
    required: true
  docker_tag:
    description: 'Tag for the image to build (usually branch name)'
    required: true
  discord_webhook:
    description: 'Webhook URL to send status updates'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Check out the repo
      uses: actions/checkout@v2

    - name: Build And Push Image
      uses: docker/build-push-action@v2
      with:
        build-args: |
          BASE_IMAGE=ghcr.io/sprocketbot/monorepo-core:${{ inputs.docker_tag }}
        context: ${{ inputs.build_directory }}
        file: ${{ inputs.build_directory }}/Dockerfile
        target: app_image
        push: true
        tags: ghcr.io/sprocketbot/${{ inputs.docker_image }}:${{ inputs.docker_tag }}
        platforms: linux/amd64

    - uses: sarisia/actions-status-discord@v1
      if: startsWith( inputs.discord_webhook, 'https' )
      with:
        webhook: ${{ inputs.discord_webhook }}
        title: Built `${{ inputs.docker_image }}:${{ inputs.docker_tag }}`
