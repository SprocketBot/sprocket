name: Build Sprocket Container
description: 'Builds and pushes a Sprocket Container to GHCR'

inputs:
  build_directory:
    description: 'Path in the monorepo to use as root'
    required: true
  docker_image:
    description: 'Name of the image to build'
    required: true
  docker_tag:
    description: 'Tag for the image to build (usually branch name)'
    required: true
  discord_webhook:
    description: 'Webhook URL to send status updates'
    required: false
  push_image:
    description: 'Whether to push the built image to GHCR'
    required: false
    default: 'true'
  immutable_sha:
    description: 'When set (full git SHA), also push ghcr.io/.../image:sha-<SHA> for immutable promotion references.'
    required: false
    default: ''

outputs:
  digest:
    description: 'Image digest (sha256:...) after push; empty when push is disabled.'
    value: ${{ steps.docker_build.outputs.digest }}
  image_name:
    description: 'Short image/service name (docker_image input).'
    value: ${{ inputs.docker_image }}

runs:
  using: 'composite'
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GHCR
      if: inputs.push_image == 'true'
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Check out the repo
      uses: actions/checkout@v6

    - name: Compute image tags
      id: image_tags
      shell: bash
      run: |
        REGISTRY="ghcr.io/sprocketbot"
        IMG="${{ inputs.docker_image }}"
        TAG="${{ inputs.docker_tag }}"
        TAGS="${REGISTRY}/${IMG}:${TAG}"
        IMMUTABLE="${{ inputs.immutable_sha }}"
        if [ -n "${IMMUTABLE}" ]; then
          TAGS="${TAGS}"$'\n'"${REGISTRY}/${IMG}:sha-${IMMUTABLE}"
        fi
        {
          echo 'tags<<EOF'
          echo "${TAGS}"
          echo 'EOF'
        } >> "${GITHUB_OUTPUT}"

    - name: Build And Push Image
      id: docker_build
      uses: docker/build-push-action@v7
      with:
        build-args: |
          BASE_IMAGE=ghcr.io/sprocketbot/monorepo-core:${{ inputs.docker_tag }}
        context: ${{ inputs.build_directory }}
        file: ${{ inputs.build_directory }}/Dockerfile
        target: app_image
        push: ${{ inputs.push_image == 'true' }}
        tags: ${{ steps.image_tags.outputs.tags }}
        platforms: linux/amd64

    - uses: sarisia/actions-status-discord@v1
      if: startsWith( inputs.discord_webhook, 'https' )
      with:
        webhook: ${{ inputs.discord_webhook }}
        title: Built `${{ inputs.docker_image }}:${{ inputs.docker_tag }}`
