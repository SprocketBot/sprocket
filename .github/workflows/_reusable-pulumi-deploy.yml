# Reusable Pulumi sequences driven by infra/ci/stack-map.yaml (#682).
#
# Callers set deploy_profile + target + git SHA. Stack order and per-step commands are emitted by
# scripts/ci/read-stack-map.mjs (parses stack-map.yaml; no secrets).
#
# Secrets: pass `secrets: inherit` from the caller. Credential *names* differ for production
# (PROD_*) vs dev/staging/preview (shared pre-prod names). New lanes: add a caller workflow that
# maps lane-specific environment secrets explicitly — GitHub Actions cannot index secrets dynamically.

on:
  workflow_call:
    inputs:
      lane:
        description: 'Logical lane (e.g. main, v15); for documentation and future env JSON routing'
        required: false
        type: string
        default: main
      target:
        description: 'Stack-map key: dev | staging | prod (used by preview_all plan)'
        required: false
        type: string
        default: dev
      git_sha:
        description: 'Commit SHA to check out'
        required: true
        type: string
      deploy_profile:
        description: 'dev_cd | staging_up | prod_cd | preview_all'
        required: true
        type: string
      bom_download_run_id:
        description: 'If set, download artifact bom-main from this run (dev CD after Autobuild)'
        required: false
        type: string
        default: ''
      dev_platform_stack:
        description: 'Platform stack name for dev_cd (must not be prod). Required when deploy_profile is dev_cd.'
        required: false
        type: string
        default: ''
      promote_bom_file:
        description: 'For staging_up: optional repo-relative BOM path (see scripts/ci/promote-images.sh)'
        required: false
        type: string
        default: ''
      promote_image_tag:
        description: 'For staging_up: optional explicit image tag (skips BOM / sha derivation)'
        required: false
        type: string
        default: ''
      staging_include_promote_step:
        description: 'If true (staging_up only), run promote-images.sh before Pulumi ups'
        required: false
        type: boolean
        default: false
      prod_confirm:
        description: 'Typo guard for prod_cd: empty ok; else must equal repo full name or DEPLOY_PROD'
        required: false
        type: string
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  dev_prepare:
    name: Dev — BOM + platform image tag
    if: inputs.deploy_profile == 'dev_cd'
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_sha }}

      - name: Download merged BOM (optional)
        if: inputs.bom_download_run_id != ''
        uses: actions/download-artifact@v4
        with:
          name: bom-main
          path: bom-download
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.bom_download_run_id }}

      - name: Set up Node.js (Pulumi CLI for platform config)
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Pulumi CLI
        shell: bash
        run: |
          curl -fsSL https://get.pulumi.com | sh -s -- --version "3.229.0"
          echo "${HOME}/.pulumi/bin" >> "${GITHUB_PATH}"

      - name: Set dev platform image tag (sha-* from BOM when present)
        shell: bash
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          PULUMI_BACKEND_URL: ${{ secrets.PULUMI_BACKEND_URL }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          DEPLOY_SHA: ${{ inputs.git_sha }}
          PULUMI_DEV_PLATFORM_STACK: ${{ inputs.dev_platform_stack }}
        run: |
          set -euo pipefail
          if [ -z "${PULUMI_DEV_PLATFORM_STACK}" ]; then
            echo "::error::dev_platform_stack is required for deploy_profile dev_cd"
            exit 1
          fi
          if [ "${PULUMI_DEV_PLATFORM_STACK}" = "prod" ]; then
            echo "::error::Refusing to set image tag on platform stack named prod."
            exit 1
          fi
          if [ -n "${PULUMI_BACKEND_URL:-}" ]; then
            pulumi login "${PULUMI_BACKEND_URL}"
          fi
          BOM_PATH=""
          if [ -d bom-download ]; then
            BOM_PATH="$(find bom-download -type f -name 'main-*.json' | head -1 || true)"
          fi
          bash ./scripts/ci/pulumi-set-dev-image-tag.sh "${DEPLOY_SHA}" "${BOM_PATH}"

  matrix_prepare:
    name: Build deploy plan from stack-map
    runs-on: ubuntu-latest
    outputs:
      plan_json: ${{ steps.map.outputs.plan_json }}
      projects_json: ${{ steps.map.outputs.projects_json }}
    steps:
      - name: Validate prod confirm (typo guard)
        if: inputs.deploy_profile == 'prod_cd'
        shell: bash
        env:
          CONFIRM: ${{ inputs.prod_confirm }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "${CONFIRM}" ] && [ "${CONFIRM}" != "${REPO}" ] && [ "${CONFIRM}" != "DEPLOY_PROD" ]; then
            echo "::error::When set, confirm must equal ${REPO} or DEPLOY_PROD (got: ${CONFIRM})"
            exit 1
          fi

      - name: Check out
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_sha }}
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Emit deploy plan JSON
        id: map
        shell: bash
        env:
          PROFILE: ${{ inputs.deploy_profile }}
          TARGET: ${{ inputs.target }}
          PLAT: ${{ inputs.dev_platform_stack }}
          STAGING_PROMOTE: ${{ inputs.staging_include_promote_step }}
          GIT_SHA: ${{ inputs.git_sha }}
        run: |
          set -euo pipefail
          case "${PROFILE}" in
            dev_cd)
              if [ -z "${PLAT}" ]; then
                echo "::error::dev_platform_stack required for dev_cd"
                exit 1
              fi
              node scripts/ci/read-stack-map.mjs emit --plan dev_cd_full --platform-stack "${PLAT}" --git-sha "${GIT_SHA}"
              ;;
            staging_up)
              if [ "${STAGING_PROMOTE}" = "true" ]; then
                node scripts/ci/read-stack-map.mjs emit --plan staging_up --prepend-staging-promote --git-sha "${GIT_SHA}"
              else
                node scripts/ci/read-stack-map.mjs emit --plan staging_up --git-sha "${GIT_SHA}"
              fi
              ;;
            prod_cd)
              node scripts/ci/read-stack-map.mjs emit --plan prod_cd --git-sha "${GIT_SHA}"
              ;;
            preview_all)
              case "${TARGET}" in
                dev|staging|prod) ;;
                *)
                  echo "::error::target must be dev, staging, or prod for preview_all (got: ${TARGET})"
                  exit 1
                  ;;
              esac
              node scripts/ci/read-stack-map.mjs emit --plan dev_preview_all --target "${TARGET}"
              ;;
            *)
              echo "::error::Unknown deploy_profile: ${PROFILE}"
              exit 1
              ;;
          esac

  deploy:
    name: Pulumi deploy sequence
    needs:
      - matrix_prepare
      - dev_prepare
    if: |
      always() &&
      needs.matrix_prepare.result == 'success' &&
      (
        inputs.deploy_profile != 'dev_cd' ||
        needs.dev_prepare.result == 'success'
      )
    runs-on: ubuntu-latest
    environment: >-
      ${{
        inputs.deploy_profile == 'prod_cd' && 'production' ||
        inputs.deploy_profile == 'staging_up' && 'staging' ||
        inputs.deploy_profile == 'preview_all' && 'preview' ||
        'development'
      }}
    env:
      PLAN_JSON: ${{ needs.matrix_prepare.outputs.plan_json }}
      PROJECTS_JSON: ${{ needs.matrix_prepare.outputs.projects_json }}
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_sha }}

      - name: Load deploy credentials
        shell: bash
        env:
          DEPLOY_PROFILE: ${{ inputs.deploy_profile }}
          PREPROD_PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          PREPROD_PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
          PREPROD_AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          PREPROD_AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          PREPROD_MANAGER_HOST: ${{ secrets.PULUMI_MANAGER_NODE_HOST }}
          PREPROD_SSH_USER: ${{ secrets.PULUMI_SSH_USER }}
          PREPROD_SSH_KEY: ${{ secrets.PULUMI_SSH_KEY }}
          PREPROD_TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
          PREPROD_BACKEND_URL: ${{ secrets.PULUMI_BACKEND_URL }}
          PROD_PULUMI_ACCESS_TOKEN: ${{ secrets.PROD_PULUMI_ACCESS_TOKEN }}
          PROD_MANAGER_HOST: ${{ secrets.PROD_MANAGER_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_TAILSCALE_AUTHKEY: ${{ secrets.PROD_TAILSCALE_AUTHKEY }}
        run: |
          set -euo pipefail
          if [ "${DEPLOY_PROFILE}" = "prod_cd" ]; then
            {
              printf 'PULUMI_ACCESS_TOKEN<<__EOF__\n%s\n__EOF__\n' "${PROD_PULUMI_ACCESS_TOKEN}"
              printf 'PULUMI_MANAGER_NODE_HOST<<__EOF__\n%s\n__EOF__\n' "${PROD_MANAGER_HOST}"
              printf 'PULUMI_SSH_USER<<__EOF__\n%s\n__EOF__\n' "${PROD_SSH_USER}"
              printf 'PULUMI_SSH_KEY<<__EOF__\n%s\n__EOF__\n' "${PROD_SSH_KEY}"
              printf 'TAILSCALE_AUTHKEY<<__EOF__\n%s\n__EOF__\n' "${PROD_TAILSCALE_AUTHKEY}"
              printf 'PULUMI_BACKEND_URL<<__EOF__\n%s\n__EOF__\n' ""
              printf 'PULUMI_CONFIG_PASSPHRASE<<__EOF__\n%s\n__EOF__\n' ""
              printf 'AWS_ACCESS_KEY_ID<<__EOF__\n%s\n__EOF__\n' ""
              printf 'AWS_SECRET_ACCESS_KEY<<__EOF__\n%s\n__EOF__\n' ""
              printf 'AWS_REGION<<__EOF__\n%s\n__EOF__\n' ""
            } >> "${GITHUB_ENV}"
          else
            {
              printf 'PULUMI_ACCESS_TOKEN<<__EOF__\n%s\n__EOF__\n' "${PREPROD_PULUMI_ACCESS_TOKEN}"
              printf 'PULUMI_MANAGER_NODE_HOST<<__EOF__\n%s\n__EOF__\n' "${PREPROD_MANAGER_HOST}"
              printf 'PULUMI_SSH_USER<<__EOF__\n%s\n__EOF__\n' "${PREPROD_SSH_USER}"
              printf 'PULUMI_SSH_KEY<<__EOF__\n%s\n__EOF__\n' "${PREPROD_SSH_KEY}"
              printf 'TAILSCALE_AUTHKEY<<__EOF__\n%s\n__EOF__\n' "${PREPROD_TAILSCALE_AUTHKEY}"
              printf 'PULUMI_BACKEND_URL<<__EOF__\n%s\n__EOF__\n' "${PREPROD_BACKEND_URL}"
              printf 'PULUMI_CONFIG_PASSPHRASE<<__EOF__\n%s\n__EOF__\n' "${PREPROD_PULUMI_CONFIG_PASSPHRASE}"
              printf 'AWS_ACCESS_KEY_ID<<__EOF__\n%s\n__EOF__\n' "${PREPROD_AWS_ACCESS_KEY_ID}"
              printf 'AWS_SECRET_ACCESS_KEY<<__EOF__\n%s\n__EOF__\n' "${PREPROD_AWS_SECRET_ACCESS_KEY}"
              printf 'AWS_REGION<<__EOF__\n%s\n__EOF__\n' "nyc3"
            } >> "${GITHUB_ENV}"
          fi

      - name: Mark Tailscale usage
        shell: bash
        run: |
          if [ -n "${TAILSCALE_AUTHKEY:-}" ]; then
            echo "TAILSCALE_ENABLED=1" >> "${GITHUB_ENV}"
          else
            echo "TAILSCALE_ENABLED=0" >> "${GITHUB_ENV}"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            infra/layer_1/package-lock.json
            infra/layer_2/package-lock.json
            infra/platform/package-lock.json

      - name: Restore Pulumi plugin cache
        uses: actions/cache@v4
        with:
          path: ~/.pulumi/plugins
          key: pulumi-plugins-${{ runner.os }}-3.229.0-${{ hashFiles('infra/layer_1/package-lock.json', 'infra/layer_2/package-lock.json', 'infra/platform/package-lock.json') }}

      - name: Install Pulumi CLI
        shell: bash
        run: |
          curl -fsSL https://get.pulumi.com | sh -s -- --version "3.229.0"
          echo "${HOME}/.pulumi/bin" >> "${GITHUB_PATH}"

      - name: Connect Tailscale
        if: env.TAILSCALE_ENABLED == '1'
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ env.TAILSCALE_AUTHKEY }}

      - name: Configure remote Docker host
        shell: bash
        run: |
          ssh_dir="${HOME}/.ssh"
          key_file="${RUNNER_TEMP}/docker-host-${PULUMI_MANAGER_NODE_HOST}-${PULUMI_SSH_USER}.pem"

          mkdir -p "${ssh_dir}"
          chmod 700 "${ssh_dir}"
          printf '%s\n' "${PULUMI_SSH_KEY}" > "${key_file}"
          chmod 600 "${key_file}"

          {
            echo "Host ${PULUMI_MANAGER_NODE_HOST}"
            echo "  HostName ${PULUMI_MANAGER_NODE_HOST}"
            echo "  User ${PULUMI_SSH_USER}"
            echo "  Port 22"
            echo "  IdentityFile ${key_file}"
            echo "  StrictHostKeyChecking no"
            echo "  IdentitiesOnly yes"
            echo "  ControlMaster auto"
            echo "  ControlPath ~/.ssh/socket-%r@%h:%p"
            echo "  ControlPersist yes"
          } >> "${ssh_dir}/config"
          chmod 600 "${ssh_dir}/config"

          echo "DOCKER_HOST=ssh://${PULUMI_SSH_USER}@${PULUMI_MANAGER_NODE_HOST}:22" >> "${GITHUB_ENV}"
          echo "DOCKER_SSH_KEY_FILE=${key_file}" >> "${GITHUB_ENV}"

      - name: Log in to Pulumi backend
        if: env.PULUMI_BACKEND_URL != ''
        shell: bash
        run: pulumi login "${PULUMI_BACKEND_URL}"

      - name: Install infra dependencies once
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t projects < <(python3 - <<'PY'
          import json
          import os

          for project in json.loads(os.environ["PROJECTS_JSON"]):
              print(project)
          PY
          )

          args=()
          for project in "${projects[@]}"; do
            args+=(--project "${project}")
          done

          bash ./scripts/infra/pulumi-install-all.sh "${args[@]}"

      - name: Run deploy plan
        shell: bash
        env:
          PROMOTE_GIT_SHA: ${{ inputs.git_sha }}
          PROMOTE_BOM_FILE: ${{ inputs.promote_bom_file }}
          PROMOTE_IMAGE_TAG: ${{ inputs.promote_image_tag }}
        run: |
          set -euo pipefail

          python3 - <<'PY' > "${RUNNER_TEMP}/deploy-plan.tsv"
          import json
          import os

          for row in json.loads(os.environ["PLAN_JSON"]):
              print(f'{row["command"]}\t{row["stack_project"]}\t{row["stack_name"]}')
          PY

          previewed_keys='|'

          while IFS=$'\t' read -r command project stack; do
            echo "::group::${command} ${project}/${stack}"
            case "${command}" in
              staging_promote)
                args=(./scripts/ci/promote-images.sh pulumi-set-platform-tag)
                if [[ -n "${PROMOTE_BOM_FILE}" ]]; then
                  args+=(--bom-file "${PROMOTE_BOM_FILE}")
                fi
                if [[ -n "${PROMOTE_IMAGE_TAG}" ]]; then
                  args+=(--image-tag "${PROMOTE_IMAGE_TAG}")
                fi
                args+=("${PROMOTE_GIT_SHA}" "staging")
                "${args[@]}"
                ;;
              preview)
                (
                  cd "./infra/${project}"
                  pulumi preview --stack "${stack}"
                )
                previewed_keys="${previewed_keys}${project}/${stack}|"
                ;;
              up)
                up_args=(up --yes --stack "${stack}")
                if [[ "${previewed_keys}" == *"|${project}/${stack}|"* ]]; then
                  up_args+=(--skip-preview)
                fi
                (
                  cd "./infra/${project}"
                  pulumi "${up_args[@]}"
                )
                ;;
              refresh)
                (
                  cd "./infra/${project}"
                  pulumi refresh --stack "${stack}"
                )
                ;;
              *)
                echo "::error::Unsupported plan command: ${command}"
                exit 1
                ;;
            esac
            echo "::endgroup::"
          done < "${RUNNER_TEMP}/deploy-plan.tsv"

      - name: Clean up remote Docker SSH key
        if: always()
        shell: bash
        run: rm -f "${DOCKER_SSH_KEY_FILE}"
