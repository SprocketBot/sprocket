# Production Pulumi deploy (layer_1 → layer_2 → platform prod stacks).
#
# GitHub Environment `production` must hold **prod-only** credentials. Do not reuse
# repository or pre-prod environment secret *names* for prod paths (avoids foot-guns
# when copying workflow YAML). Configure these as **Environment secrets** on
# Settings → Environments → production:
#
#   PROD_MANAGER_HOST          — SSH/Tailscale host for the production Docker manager
#   PROD_SSH_USER             — SSH user for that host
#   PROD_SSH_KEY              — Private key for PROD_SSH_USER (prod droplet only)
#   PROD_TAILSCALE_AUTHKEY    — Optional; Tailscale auth key that reaches prod only
#   PROD_PULUMI_ACCESS_TOKEN  - Needed for login to Pulumi state provider (default pulumi cloud)
#
# Enable **required reviewers** on the `production` environment so `pulumi up` cannot
# run until approved. Note: GitHub waits for that approval before the job starts, so
# `pulumi preview` in this job also runs only after approval; the log order is still
# preview for all prod stacks, then `pulumi up` in dependency order (#667 / infra README).
#
# Rollback / break-glass: see issue #680.
#
# Related: #678

name: CD Deploy Production

on:
  workflow_dispatch:
    inputs:
      git_sha:
        description: 'Full commit SHA to deploy (exact ref; not floating main)'
        required: true
        type: string
      confirm:
        description: 'Typo guard: set to the repo full name (org/repo) or DEPLOY_PROD (optional if left empty)'
        required: false
        type: string
        default: ''

concurrency:
  group: prod-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  pulumi-prod:
    name: Pulumi preview and up (production stacks)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate confirm input
        shell: bash
        env:
          CONFIRM: ${{ github.event.inputs.confirm }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "${CONFIRM}" ] && [ "${CONFIRM}" != "${REPO}" ] && [ "${CONFIRM}" != "DEPLOY_PROD" ]; then
            echo "::error::When set, confirm must equal ${REPO} or DEPLOY_PROD (got: ${CONFIRM})"
            exit 1
          fi

      - name: Check out the repo at requested SHA
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.git_sha }}

      - name: Pulumi preview — layer_1 / layer_1
        uses: ./.github/reusable_workflows/pulumi_up
        env:
          PROD_PULUMI_ACCESS_TOKEN: ${{ secrets.PROD_PULUMI_ACCESS_TOKEN }}
        with:
          command: preview
          stack-project: layer_1
          stack-name: layer_1
          manager-node-host: ${{ secrets.PROD_MANAGER_HOST }}
          ssh-user: ${{ secrets.PROD_SSH_USER }}
          ssh-key: ${{ secrets.PROD_SSH_KEY }}
          tailscale-authkey: ${{ secrets.PROD_TAILSCALE_AUTHKEY }}

      - name: Pulumi preview — layer_2 / layer_2
        uses: ./.github/reusable_workflows/pulumi_up
        env:
          PROD_PULUMI_ACCESS_TOKEN: ${{ secrets.PROD_PULUMI_ACCESS_TOKEN }}
        with:
          command: preview
          stack-project: layer_2
          stack-name: layer_2
          manager-node-host: ${{ secrets.PROD_MANAGER_HOST }}
          ssh-user: ${{ secrets.PROD_SSH_USER }}
          ssh-key: ${{ secrets.PROD_SSH_KEY }}
          tailscale-authkey: ${{ secrets.PROD_TAILSCALE_AUTHKEY }}

      - name: Pulumi preview — platform / prod
        uses: ./.github/reusable_workflows/pulumi_up
        env:
          PROD_PULUMI_ACCESS_TOKEN: ${{ secrets.PROD_PULUMI_ACCESS_TOKEN }}
        with:
          command: preview
          stack-project: platform
          stack-name: prod
          manager-node-host: ${{ secrets.PROD_MANAGER_HOST }}
          ssh-user: ${{ secrets.PROD_SSH_USER }}
          ssh-key: ${{ secrets.PROD_SSH_KEY }}
          tailscale-authkey: ${{ secrets.PROD_TAILSCALE_AUTHKEY }}

      - name: Pulumi up — layer_1 / layer_1
        uses: ./.github/reusable_workflows/pulumi_up
        env:
          PROD_PULUMI_ACCESS_TOKEN: ${{ secrets.PROD_PULUMI_ACCESS_TOKEN }}
        with:
          command: up
          stack-project: layer_1
          stack-name: layer_1
          manager-node-host: ${{ secrets.PROD_MANAGER_HOST }}
          ssh-user: ${{ secrets.PROD_SSH_USER }}
          ssh-key: ${{ secrets.PROD_SSH_KEY }}
          tailscale-authkey: ${{ secrets.PROD_TAILSCALE_AUTHKEY }}

      - name: Pulumi up — layer_2 / layer_2
        uses: ./.github/reusable_workflows/pulumi_up
        env:
          PROD_PULUMI_ACCESS_TOKEN: ${{ secrets.PROD_PULUMI_ACCESS_TOKEN }}
        with:
          command: up
          stack-project: layer_2
          stack-name: layer_2
          manager-node-host: ${{ secrets.PROD_MANAGER_HOST }}
          ssh-user: ${{ secrets.PROD_SSH_USER }}
          ssh-key: ${{ secrets.PROD_SSH_KEY }}
          tailscale-authkey: ${{ secrets.PROD_TAILSCALE_AUTHKEY }}

      - name: Pulumi up — platform / prod
        uses: ./.github/reusable_workflows/pulumi_up
        env:
          PROD_PULUMI_ACCESS_TOKEN: ${{ secrets.PROD_PULUMI_ACCESS_TOKEN }}
        with:
          command: up
          stack-project: platform
          stack-name: prod
          manager-node-host: ${{ secrets.PROD_MANAGER_HOST }}
          ssh-user: ${{ secrets.PROD_SSH_USER }}
          ssh-key: ${{ secrets.PROD_SSH_KEY }}
          tailscale-authkey: ${{ secrets.PROD_TAILSCALE_AUTHKEY }}
