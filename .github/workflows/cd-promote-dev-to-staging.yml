name: CD Promote Dev to Staging

# Promotes an immutable image set from a known-good dev deployment (git SHA) to Pulumi
# **staging** stacks only. Does not reference prod stacks or the production environment.
# Stack order + first-step image tag: [.github/workflows/_reusable-pulumi-deploy.yml](../../.github/workflows/_reusable-pulumi-deploy.yml) + infra/ci/stack-map.yaml (#682).
on:
  workflow_dispatch:
    inputs:
      git_sha:
        description: 'Full 40-character git commit SHA deployed to dev'
        required: true
        type: string
      image_tag:
        description: 'Optional explicit GHCR tag (skips BOM and sha-XXXXXXX derivation)'
        required: false
        type: string
      bom_file:
        description: 'Optional repo-relative path to BOM JSON (see scripts/ci/promote-images.sh)'
        required: false
        type: string

permissions:
  contents: read

# Post-deploy synthetic canary (#677): after staging Pulumi applies, verify public web + GraphQL.
# Configure repo or environment variables CANARY_STAGING_BASE_URL (optional) and CANARY_STAGING_API_URL (required).

jobs:
  promote-staging:
    name: Promote to staging (image tag + Pulumi)
    uses: ./.github/workflows/_reusable-pulumi-deploy.yml
    with:
      lane: main
      target: staging
      git_sha: ${{ inputs.git_sha }}
      deploy_profile: staging_up
      staging_include_promote_step: true
      promote_bom_file: ${{ inputs.bom_file }}
      promote_image_tag: ${{ inputs.image_tag }}
    secrets: inherit

  canary_after_staging:
    name: Post-deploy synthetic canary (staging)
    needs: promote-staging
    uses: ./.github/workflows/canary-staging.yml
    with:
      checkout_ref: ${{ inputs.git_sha }}
      staging_base_url: ${{ vars.CANARY_STAGING_BASE_URL != '' && vars.CANARY_STAGING_BASE_URL || 'https://staging.app.sprocket.gg' }}
      staging_api_url: ${{ vars.CANARY_STAGING_API_URL }}
