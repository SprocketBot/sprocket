# Tier 0 harness for the main-dev lane after a successful dev deploy (#674).
#
# Chained mode: set the deploying workflow's top-level `name:` to "CD Deploy Dev"
# (see #673) so `workflow_run` matches exactly. You can also merge the job below
# into that workflow with `needs: deploy-dev` instead of using workflow_run.
name: Verify main-dev Tier 0

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CD Deploy Dev
    types:
      - completed

concurrency:
  group: verify-main-dev-tier0-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  actions: write

jobs:
  verify-dev-tier0:
    name: verify-dev-tier0
    runs-on: ubuntu-latest
    environment: development
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_repository.full_name == github.repository)
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve Tier 0 profile (main-dev)
        env:
          HARNESS_MAIN_DEV_ENV: ${{ secrets.HARNESS_MAIN_DEV_ENV }}
        run: |
          set +x
          if [ -n "${HARNESS_MAIN_DEV_ENV}" ]; then
            profile_path="${RUNNER_TEMP}/main-dev.env"
            printf '%s\n' "${HARNESS_MAIN_DEV_ENV}" > "${profile_path}"
          else
            profile_path="scripts/harness/env/main-dev.env"
          fi
          printf 'HARNESS_MAIN_DEV_PROFILE=%s\n' "${profile_path}" >> "${GITHUB_ENV}"

      - name: Prepare optional core startup check
        run: |
          set +x
          if grep -q '^HARNESS_CHECK_CORE_START=true$' "${HARNESS_MAIN_DEV_PROFILE}"; then
            docker compose build core
            docker compose up -d rabbitmq minio redis postgres
          else
            echo "Core startup check is not enabled for this Tier 0 profile."
          fi

      - name: Run Tier 0 harness (main-dev)
        env:
          HARNESS_MAIN_DEV_ENV: ${{ secrets.HARNESS_MAIN_DEV_ENV }}
          HARNESS_WEB_URL: ${{ secrets.HARNESS_WEB_URL }}
        run: |
          set +x
          npm run verify:tier0 -- main-dev "${HARNESS_MAIN_DEV_PROFILE}"

      - name: Upload harness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-main-dev-tier0-${{ github.run_id }}
          path: artifacts/release-validation/
          if-no-files-found: ignore
